<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Beaver - 8bit Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="beaverMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <h1 class="pixel-title">BEAVER DANCE PARTY</h1>

    <div class="dancer"></div>

    <script>
        // Dès que l'utilisateur clique n'importe où, la musique se lance
        document.addEventListener('click', function() {
            const audio = document.getElementById("beaverMusic");
            audio.play();
        }, { once: true }); // Le 'once: true' évite que le code se relance à chaque clic
    </script>
    
</body>
</html>
